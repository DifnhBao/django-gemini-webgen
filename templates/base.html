<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Django Gemini AI Builder{% endblock %}</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
    />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <header class="bg-white shadow-sm border-b">
      <div
        class="mx-auto max-w-5xl px-4 py-4 flex justify-between items-center"
      >
        <div>
          <a href="/" class="text-lg font-semibold">Website AI Builder</a>
        </div>
        <nav class="space-x-4 text-sm">
          {% if user.is_authenticated %}
          <span>Hello, {{ user.username }}</span>
          <a
            href="{% url 'accounts:logout' %}"
            class="text-blue-600 hover:underline"
            >Logout</a
          >
          {% else %}
          <a
            href="{% url 'accounts:login' %}"
            class="text-blue-600 hover:underline"
            >Login</a
          >
          <a
            href="{% url 'accounts:signup' %}"
            class="text-blue-600 hover:underline"
            >Register</a
          >
          {% endif %}
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-4xl px-4 py-8">
      {% if messages %}
      <div class="space-y-2 mb-6">
        {% for message in messages %}
        <div class="rounded-lg border px-4 py-3 {{ message.tags }}">
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %} {% block content %}{% endblock %}
    </main>
  </body>
</html>
